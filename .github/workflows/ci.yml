name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: CLI version
        run: node tools/aeon-cli/bin/aeon.js --version

      - name: Scan repo
        run: node tools/aeon-cli/bin/aeon.js scan

      - name: Lint AGENTS.md
        run: node tools/aeon-cli/bin/aeon.js lint AGENTS.md --no-color

      - name: Init preview
        run: node tools/aeon-cli/bin/aeon.js init --stdout --no-color > /dev/null
